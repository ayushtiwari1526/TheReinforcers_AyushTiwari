# Server Configuration
server.port=${PORT:8080}

# Application Name
spring.application.name=AI Trading Signal Engine

# API Keys - From environment variables (for cloud deployment)
# Local fallback values can be set here
newsapi.key=${NEWSAPI_KEY:f9525722f8744ba0a793aef0acfa84c2}
finnhub.key=${FINNHUB_KEY:YOUR_FINNHUB_KEY}

# Flask AI Service Configuration
# From environment variable (cloud) or localhost (development)
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:*}

# Logging Configuration
logging.level.com.trading=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
