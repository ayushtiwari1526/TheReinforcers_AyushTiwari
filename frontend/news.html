<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow My Trade | AI News-Based Trading Suggestion Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="premium-ui.css">
    <link rel="stylesheet" href="chatbot.css">
    <style>
        /* Navbar Fixes */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 30px;
            align-items: center;
        }

        .nav-menu li a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .nav-menu li a:hover {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .nav-menu li a.active {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e27 !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* Page Layout */
        body {
            background: #0a0e27;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 25px;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e27;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn-refresh:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* News Grid */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: #00ff88;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.2);
        }

        .news-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.875rem;
        }

        .news-source {
            color: #00d4ff;
            font-weight: 600;
        }

        .news-time {
            color: #808080;
        }

        .news-title {
            font-size: 1.25rem;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.5;
            font-weight: 600;
        }

        .news-description {
            color: #a0a0a0;
            font-size: 0.9375rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .news-card-footer {
            display: flex;
            justify-content: flex-end;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e27;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-analyze:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner-small {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-text,
        .error-text {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
            font-size: 1.125rem;
            grid-column: 1 / -1;
        }

        .error-text {
            color: #ff4757;
        }

        /* Load More Button */
        .btn-load-more {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e27;
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 40px auto 0;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-load-more:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }

        .btn-load-more:active {
            transform: translateY(-1px);
        }

        /* Footer */
        .footer {
            background: rgba(17, 22, 56, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            margin-top: 80px;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer p {
            color: #808080;
            margin: 0;
        }

        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            color: #00ff88;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: #00d4ff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu {
                gap: 15px;
            }

            .nav-menu li a {
                padding: 6px 8px;
                font-size: 0.875rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo">
                    <div class="logo-main">Grow My Trade</div>
                    <div class="logo-subtitle">AI News-Based Trading Suggestion Platform</div>
                </div>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="news.html" class="active">News</a></li>
                <li><a href="market.html">Market</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="dashboard.html" class="btn-primary">Get Started</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>📰 Latest Financial News</h1>
            <p>Analyze financial news to generate <span class="highlight-ai">AI</span>-based trading signals</p>
            <button class="btn-refresh" onclick="fetchLatestNews()" id="refreshNewsBtn">
                <span>🔄</span> Refresh News
            </button>
        </div>

        <!-- News Grid -->
        <div class="news-grid" id="newsGrid">
            <!-- News cards will be loaded here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2024 AI Trading Signal Engine. Powered by Gemma SLM.</p>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </footer>

    <script src="api-config.js"></script>
    <script src="news.js"></script>
    
    <!-- AI Chatbot -->
    <script src="chatbot.js"></script>
</body>
</html>
